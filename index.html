<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global Servicing Innovation Brief</title>
    <meta
      name="description"
      content="A GitHub-hosted weekly servicing innovation brief for technical product teams."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="topbar" aria-label="Page actions">
        <a href="Global_Servicing_Innovation_Brief_Jul2_2026_gen-Jul2.md">Source Markdown</a>
        <a href="https://github.com/jilldevin/Github-Live-Weekly-Servicing-Innovation-Brief">GitHub Repo</a>
      </nav>
      <div class="hero-content">
        <p class="eyebrow">Weekly Brief</p>
        <h1>Global Servicing Innovation Brief</h1>
        <p class="dek">A clean web view of the July 2, 2026 briefing artifact.</p>
      </div>
    </header>

    <main class="shell">
      <aside class="sidebar" aria-label="Brief navigation">
        <p class="sidebar-label">Contents</p>
        <ol id="toc" class="toc"></ol>
      </aside>

      <article class="brief-card">
        <div id="brief" class="brief" aria-live="polite">
          <p>Loading brief...</p>
        </div>
      </article>
    </main>

    <script>
      const sourceFile = "Global_Servicing_Innovation_Brief_Jul2_2026_gen-Jul2.md";
      const briefEl = document.getElementById("brief");
      const tocEl = document.getElementById("toc");

      const escapeHtml = (value) =>
        value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");

      const slugify = (value) =>
        value
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, "")
          .trim()
          .replace(/\s+/g, "-");

      const renderInline = (value) => {
        let output = escapeHtml(value);
        output = output.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        output = output.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        output = output.replace(/`([^`]+)`/g, "<code>$1</code>");
        return output;
      };

      const renderMarkdown = (markdown) => {
        const lines = markdown.split("\n");
        const toc = [];
        let html = "";
        let inList = false;

        const closeList = () => {
          if (inList) {
            html += "</ul>";
            inList = false;
          }
        };

        for (const rawLine of lines) {
          const line = rawLine.trimEnd();

          if (!line.trim()) {
            closeList();
            continue;
          }

          if (line === "---") {
            closeList();
            html += "<hr />";
            continue;
          }

          const heading = line.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            closeList();
            const level = heading[1].length;
            const text = heading[2];
            const id = slugify(text);
            if (level === 2 || level === 3) {
              toc.push({ level, text, id });
            }
            html += `<h${level} id="${id}">${renderInline(text)}</h${level}>`;
            continue;
          }

          const bullet = line.match(/^\*\s+(.+)$/);
          if (bullet) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            html += `<li>${renderInline(bullet[1])}</li>`;
            continue;
          }

          closeList();
          html += `<p>${renderInline(line)}</p>`;
        }

        closeList();
        return { html, toc };
      };

      const renderToc = (items) => {
        tocEl.innerHTML = items
          .map((item) => `<li class="toc-level-${item.level}"><a href="#${item.id}">${escapeHtml(item.text)}</a></li>`)
          .join("");
      };

      fetch(sourceFile)
        .then((response) => {
          if (!response.ok) {
            throw new Error("Unable to load the brief.");
          }
          return response.text();
        })
        .then((markdown) => {
          const rendered = renderMarkdown(markdown);
          briefEl.innerHTML = rendered.html;
          renderToc(rendered.toc);
        })
        .catch(() => {
          briefEl.innerHTML = `<p>Unable to load the brief. Open the <a href="${sourceFile}">source Markdown</a>.</p>`;
        });
    </script>
  </body>
</html>
