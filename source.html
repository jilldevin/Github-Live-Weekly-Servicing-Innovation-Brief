<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML Source | Global Servicing Innovation Brief</title>
    <meta
      name="description"
      content="View the HTML source for the Global Servicing Innovation Brief web page."
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .source-panel {
        border: 1px solid var(--hairline);
        margin-top: 8px;
        overflow: auto;
      }

      .source-panel pre {
        margin: 0;
        padding: 16px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .source-panel code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <nav class="topbar" aria-label="Page actions">
        <a href="index.html">Rendered Brief</a>
        <a href="Global_Servicing_Innovation_Brief_Jul2_2026_gen-Jul2.md">Source Markdown</a>
        <a href="https://github.com/jilldevin/Github-Live-Weekly-Servicing-Innovation-Brief">GitHub Repo</a>
      </nav>
      <div class="hero-content">
        <p class="eyebrow">Source View</p>
        <h1>index.html</h1>
        <p class="dek">The HTML used to render the weekly brief web page.</p>
      </div>
    </header>

    <main class="shell" style="grid-template-columns: minmax(0, 1fr); max-width: 1040px;">
      <section class="brief-card" aria-label="HTML source code">
        <div id="source" class="source-panel" aria-live="polite">
          <pre><code>Loading HTML source...</code></pre>
        </div>
      </section>
    </main>

    <script>
      const sourceFile = "index.html";
      const sourceEl = document.getElementById("source");

      const escapeHtml = (value) =>
        value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");

      fetch(sourceFile)
        .then((response) => {
          if (!response.ok) {
            throw new Error("Unable to load HTML source.");
          }
          return response.text();
        })
        .then((html) => {
          sourceEl.innerHTML = `<pre><code>${escapeHtml(html)}</code></pre>`;
        })
        .catch(() => {
          sourceEl.innerHTML =
            '<pre><code>Unable to load HTML source. Open index.html directly.</code></pre>';
        });
    </script>
  </body>
</html>
